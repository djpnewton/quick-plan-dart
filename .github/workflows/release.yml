name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build_android:
    name: Build Android APK
    needs: analyze_and_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build_windows:
    name: Build Windows
    needs: analyze_and_test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Zip Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath quick-plan-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: quick-plan-windows.zip

  build_linux:
    name: Build Linux
    needs: analyze_and_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libblkid-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Zip Linux build
        run: zip -r quick-plan-linux.zip build/linux/x64/release/bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: quick-plan-linux.zip

  release:
    name: Create GitHub Release
    needs: [build_android, build_windows, build_linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-release.apk
            artifacts/quick-plan-windows.zip
            artifacts/quick-plan-linux.zip
